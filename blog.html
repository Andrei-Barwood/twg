<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- Alpine.js (versión completa para usar $watch y persist) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://w.soundcloud.com/player/api.js"></script>
    <!-- p5.js (fondo animado) -->

<body>
    <!-- Fondo p5.js -->
    <div id="p5-background"></div>

    <!-- Contenido principal con fondo semitransparente -->
    <main class="main-container" x-data="blog()" x-init="init()">
        <header>
            <h1><a href="index.html">THE WOODEN GROOM</a></h1>
            <nav>
                <ul>
                    <li><a href="music.html">MÚSICA</a></li>
                    <li><a href="shows.html">SHOWS</a></li>
                    <li><a href="blog.html">BLOG</a></li>
                    <li><a href="about.html">BIO</a></li>
                    <li><a href="contact.html">CONTACTO</a></li>
                </ul>
            </nav>
        </header>

        <!-- Título de la página -->
        <h2>BLOG / NOTICIAS</h2>

        <!-- Contenido dinámico: lista de posts o post individual -->
        <div x-show="!postSeleccionado" x-cloak>
            <!-- Mostrar posts paginados -->
            <template x-for="post in postsPaginados" :key="post.slug">
                <article class="post-item" :class="post.themeClass || ''" @click="verPost(post.slug)">
                    <h3 x-text="post.title"></h3>
                    <span class="fecha" x-text="formatearFecha(post.date)"></span>
                    <p class="extracto" x-text="post.excerpt"></p>
                </article>
            </template>

            <!-- Controles de paginación -->
            <div class="paginacion">
                <button @click="paginaActual = 1" :disabled="paginaActual === 1">« Primera</button>
                <button @click="paginaActual = paginaActual - 1" :disabled="paginaActual === 1">Anterior</button>
                <span>Página <span x-text="paginaActual"></span> de <span x-text="totalPaginas"></span></span>
                <button @click="paginaActual = paginaActual + 1" :disabled="paginaActual === totalPaginas">Siguiente</button>
                <button @click="paginaActual = totalPaginas" :disabled="paginaActual === totalPaginas">Última »</button>
            </div>
        </div>

        <!-- Vista de post individual -->
        <div x-show="postSeleccionado" x-cloak>
            <button class="boton-volver" :class="postSeleccionado ? (postSeleccionado.themeClass || '') : ''" @click="volverALista">← Todos los posts</button>
            <article class="post-completo" :class="postSeleccionado ? (postSeleccionado.themeClass || '') : ''">
                <h3 x-text="postSeleccionado.title"></h3>
                <span class="fecha" x-text="formatearFecha(postSeleccionado.date)"></span>
                <img x-show="postSeleccionado.image" :src="postSeleccionado.image" alt="" class="post-imagen">
                <div class="contenido-post" x-html="postSeleccionado.content"></div>
            </article>
        </div>

        <footer>
            <p>
                <a href="https://megadoll.bandcamp.com/" target="_blank" rel="noopener noreferrer">Bandcamp</a> |
                <a href="https://www.instagram.com/thewoodengroom/" target="_blank" rel="noopener noreferrer">Instagram</a> |
                <a href="https://www.youtube.com/@TheWoodenGroom" target="_blank" rel="noopener noreferrer">YouTube</a>
            </p>
        </footer>
    </main>

    <!-- Scripts -->
    <script src="assets/js/posts-gangstar-vegas-tokyo.js"></script>
    <script src="assets/js/posts.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/p5-background.js"></script>

    <script>
        function blog() {
            return {
                // Datos
                posts: window.visiblePosts || window.posts || [], // cargados desde posts.js
                allPosts: window.posts || [],         // incluye posts ocultos pero enrutable por hash
                postsPorPagina: 5,                      // número de posts por página
                paginaActual: 1,
                postSeleccionado: null,                  // post actual en vista individual

                // Getters
                get totalPaginas() {
                    return Math.ceil(this.posts.length / this.postsPorPagina);
                },
                get postsPaginados() {
                    const inicio = (this.paginaActual - 1) * this.postsPorPagina;
                    const fin = inicio + this.postsPorPagina;
                    return this.posts.slice(inicio, fin);
                },

                // Métodos
                init() {
                    // Comprobar si hay un hash en la URL (ej. #mi-post)
                    if (window.location.hash) {
                        const slug = window.location.hash.substring(1); // quita el #
                        this.verPost(slug);
                    }

                    // Escuchar cambios en el hash (cuando el usuario navegue con el historial)
                    window.addEventListener('hashchange', () => {
                        if (window.location.hash) {
                            const slug = window.location.hash.substring(1);
                            this.verPost(slug);
                        } else {
                            this.postSeleccionado = null;
                        }
                    });
                },

                verPost(slug) {
                    // Buscar el post por slug
                    const post = this.allPosts.find(p => p.slug === slug);
                    if (post) {
                        this.postSeleccionado = post;
                        // Actualizar el hash sin recargar
                        history.pushState(null, null, `#${slug}`);
                        this.$nextTick(() => this.configurarWidgetsPost());
                    } else {
                        // Si no existe, redirigir a lista
                        this.volverALista();
                    }
                },

                volverALista() {
                    this.postSeleccionado = null;
                    this.paginaActual = 1; // opcional: resetear a primera página
                    // Limpiar el hash
                    history.pushState(null, null, window.location.pathname);
                },

                configurarWidgetsPost(reintentos = 0) {
                    const iframes = document.querySelectorAll('.contenido-post iframe.soundcloud-loop');
                    if (!iframes.length) return;

                    if (!window.SC || !window.SC.Widget) {
                        if (reintentos < 12) {
                            setTimeout(() => this.configurarWidgetsPost(reintentos + 1), 300);
                        }
                        return;
                    }

                    iframes.forEach((iframe) => {
                        if (iframe.dataset.loopBound === 'true') return;

                        const widget = window.SC.Widget(iframe);
                        iframe.dataset.loopBound = 'true';

                        widget.bind(window.SC.Widget.Events.FINISH, () => {
                            widget.seekTo(0);
                            widget.play();
                        });
                    });
                },

                formatearFecha(fechaStr) {
                    const opciones = { year: 'numeric', month: 'long', day: 'numeric' };
                    return new Date(fechaStr).toLocaleDateString('es-ES', opciones);
                }
            }
        }
    </script>

                radial-gradient(circle at bottom right, color-mix(in srgb, var(--collage-lilac) 24%, transparent), transparent 40%),
                linear-gradient(145deg, color-mix(in srgb, var(--collage-midnight) 88%, black), color-mix(in srgb, var(--collage-blue) 40%, var(--collage-deep)));
            box-shadow: -5px 5px 0 #0F5150, 0 0 0 1px rgba(156, 251, 255, 0.12), 0 0 26px rgba(119, 112, 185, 0.22);
        }
        .contenido-post .collage-glitch h3 {

        .contenido-post .glitch-shot {
            --tone-main: #00B6A3;
            --tone-accent: #9CFBFF;
            --tone-shadow: #12162C;
            position: relative;
            overflow: hidden;
            min-height: 220px;
            isolation: isolate;
            background:
                linear-gradient(180deg, color-mix(in srgb, var(--tone-shadow) 92%, black), color-mix(in srgb, var(--tone-main) 16%, var(--tone-shadow)));
            border: 2px solid color-mix(in srgb, var(--tone-accent) 48%, var(--tone-main));
            box-shadow:
                inset 0 0 0 1px rgba(156, 251, 255, 0.08),
                0 0 18px color-mix(in srgb, var(--tone-main) 22%, transparent);
            animation: collage-frame-jitter 5.6s steps(2, end) infinite;
        }
        .contenido-post .glitch-shot::before,
        .contenido-post .glitch-shot::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
        }
        .contenido-post .glitch-shot::before {
            background:
                linear-gradient(112deg, color-mix(in srgb, var(--tone-main) 28%, transparent), transparent 35%, color-mix(in srgb, var(--tone-accent) 26%, transparent) 70%, transparent),
                linear-gradient(0deg, transparent 0%, color-mix(in srgb, var(--tone-main) 18%, transparent) 100%);
            mix-blend-mode: screen;
            opacity: 0.95;
            transform: translate(6px, -3px);
            animation: collage-glitch-sweep 3.8s steps(2, end) infinite;
        }
        .contenido-post .glitch-shot::after {
            inset: 2px;
            background:
                repeating-linear-gradient(180deg, rgba(9, 14, 29, 0) 0 10px, color-mix(in srgb, var(--tone-accent) 16%, transparent) 10px 12px),
                linear-gradient(90deg, transparent 0 12%, color-mix(in srgb, var(--tone-main) 18%, transparent) 12% 17%, transparent 17% 42%, color-mix(in srgb, var(--tone-accent) 12%, transparent) 42% 48%, transparent 48% 100%);
            mix-blend-mode: screen;
            opacity: 0.8;
            animation: collage-scanlines 1.9s linear infinite;
        }
        .contenido-post .glitch-shot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 0;
            position: relative;
            z-index: 1;
            filter:
                saturate(1.16)
                contrast(1.14)
                brightness(0.96)
                hue-rotate(-4deg);
            transform: scale(1.04);
            animation: collage-image-shift 4.2s steps(3, end) infinite;
        }
        .contenido-post .glitch-shot-wide {
            grid-column: span 2;
            min-height: 300px;
        }
        .contenido-post .glitch-shot-tall {
            grid-row: span 2;
            min-height: 100%;
        }

        @keyframes collage-frame-jitter {
            0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg); }
            20% { transform: translate3d(2px, 0, 0) rotate(-0.15deg); }
            21% { transform: translate3d(-3px, 1px, 0) rotate(0.2deg); }
            48% { transform: translate3d(1px, -1px, 0) rotate(0deg); }
            49% { transform: translate3d(-2px, 1px, 0) rotate(-0.1deg); }
            76% { transform: translate3d(3px, 0, 0) rotate(0.12deg); }
        }
        @keyframes collage-glitch-sweep {
            0%, 100% { transform: translate(6px, -3px) skewX(0deg); opacity: 0.88; }
            18% { transform: translate(-8px, 2px) skewX(-6deg); opacity: 0.95; }
            19% { transform: translate(10px, -2px) skewX(8deg); opacity: 0.7; }
            57% { transform: translate(-4px, 1px) skewX(-3deg); opacity: 0.9; }
            58% { transform: translate(8px, -1px) skewX(6deg); opacity: 0.72; }
        }
        @keyframes collage-scanlines {
            0% { transform: translateY(0); opacity: 0.66; }
            50% { transform: translateY(6px); opacity: 0.82; }
            100% { transform: translateY(12px); opacity: 0.66; }
        }
        @keyframes collage-image-shift {
            0%, 100% { transform: scale(1.04) translate3d(0, 0, 0); clip-path: inset(0 0 0 0); }
            14% { transform: scale(1.055) translate3d(-4px, 0, 0); clip-path: inset(0 0 2% 0); }
            15% { transform: scale(1.04) translate3d(5px, -1px, 0); clip-path: inset(6% 0 0 0); }
            44% { transform: scale(1.05) translate3d(0, 2px, 0); clip-path: inset(0 0 4% 0); }
            45% { transform: scale(1.045) translate3d(-6px, -2px, 0); clip-path: inset(10% 0 0 0); }
            78% { transform: scale(1.06) translate3d(3px, 0, 0); clip-path: inset(0 0 0 0); }
        }
